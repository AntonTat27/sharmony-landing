local_backend: true

backend:
  name: github
  repo: AntonTat27/sharmony-landing
  branch: dev
  base_url: "https://decap-cms-oauth-murex.vercel.app"
  auth_endpoint: "auth"

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

i18n:
  structure: multiple_folders
  locales: [en, ru, de, fr, es, ar, zh]
  default_locale: en

collections:
  - name: "menu_translations"
    label: "Menu Translations"
    folder: "data"
    i18n: true
    extension: "toml"
    format: "toml"
    identifier_field: "id"
    path: "{{locale}}/menu"
    fields:
      - label: "Items"
        name: "items"
        widget: "list"
        i18n: true
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Text", name: "text", widget: "string", i18n: true }

  # Decap does not support i18n: multiple_folders with files collections.
  # Use folder collections per page type, and keep one fixed file per locale via create: false.
  - name: "ui_strings"
    label: "Header/Footer"
    folder: "content"
    i18n: true
    create: false
    extension: "md"
    format: "frontmatter"
    path: "{{locale}}/ui_strings"
    slug: "ui_strings"
    fields:
      - { label: "Banner Text", name: "banner_text", widget: "string", i18n: true }
      - { label: "Banner CTA", name: "banner_cta", widget: "string", i18n: true }

  - name: "main_page"
    label: "Main Page"
    folder: "content"
    i18n: true
    create: false
    extension: "md"
    format: "frontmatter"
    path: "{{locale}}/_index"
    slug: "_index"
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Main Intro H1", name: "main_intro_h1", widget: "string", i18n: true }
      - { label: "Main Intro H2", name: "main_intro_h2", widget: "string", i18n: true }

  - name: "investor"
    label: "Investor Page"
    folder: "content"
    i18n: true
    create: false
    extension: "md"
    format: "frontmatter"
    path: "{{locale}}/investors"
    slug: "investors"
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }

