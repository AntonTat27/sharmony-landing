<style>
    @keyframes fade-in {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes gradient {
        0%,
        100% {
            background-position: 0% 50%;
        }

        50% {
            background-position: 100% 50%;
        }
    }

    @keyframes float {
        0%,
        100% {
            transform: translateY(0px);
        }

        50% {
            transform: translateY(-20px);
        }
    }

    @keyframes gold-shift {
        0% {
            filter: hue-rotate(0deg);
        }

        100% {
            filter: hue-rotate(360deg);
        }
    }

    @keyframes glowPulse {
        0% {
            filter: none;
        }
        50% {
            /* smooth peak at halfway, interpolation will ramp up and down smoothly */
            /* reduced intensity: smaller blur radii and lower alpha for subtle glow */
            filter: drop-shadow(0 0 8px rgba(49, 208, 178, 0.30))
                    drop-shadow(0 0 14px rgba(14, 186, 195, 0.18));
        }
        100% {
            filter: none;
        }
    }

    .animate-fade-in {
        animation: fade-in 0.8s ease-out forwards;
        opacity: 0;
    }

    /* Smooth single pulse (ramp up -> peak -> ramp down) - longer and more subtle */
    .logo-assembly .piece.glow-pulse {
        animation: glowPulse 1400ms ease-in-out forwards;
        will-change: filter;
    }

    /* Give the svg-wrap some breathing room so drop-shadows aren't clipped vertically */
    .svg-wrap {
        display:inline-block;
        position:relative;
        padding-top:28px;
        padding-bottom:28px;
        overflow:visible;
    }

    /* Ensure the inline SVG allows filters to paint outside its bounds */
    .logo-svg {
        width:260px;
        height:auto;
        display:block;
        overflow:visible;
    }

    @media (min-width: 1024px) {
        .logo-svg { width: 360px; }
    }

    /* Increase specificity so tailwind/custom CSS won't override it */
    .logo-assembly .piece {
        opacity: 0;
        transform: translateY(20px) rotate(2deg);
        filter: blur(4px);
        transition:
            transform 0.9s cubic-bezier(0.22, 1, 0.36, 1),
            opacity 0.6s ease,
            filter 0.9s ease;
    }

    .logo-assembly .piece.assemble {
        opacity: 1;
        transform: translateY(0) rotate(0deg);
        filter: blur(0);
    }

    /* Small-screen fallback: show assembled logo (no animation) */
    @media (max-width: 1023px) {
        .logo-svg { width: 160px; }
        .logo-assembly .piece {
            opacity: 1 !important;
            transform: none !important;
            filter: none !important;
            transition: none !important;
        }
    }

    /* Respect reduced motion preferences */
    @media (prefers-reduced-motion: reduce) {
        .logo-assembly .piece {
            opacity: 1 !important;
            transform: none !important;
            filter: none !important;
            transition: none !important;
        }
    }
</style>

                title: document.getElementById('heroPropertyTitle'),
                location: document.getElementById('heroPropertyLocation'),
                price: document.getElementById('heroPropertyPrice'),
                yield: document.getElementById('heroPropertyYield'),
                funded: document.getElementById('heroPropertyFunded'),
                progress: document.getElementById('heroPropertyProgress')
            };

            if (elements.image) {
                elements.image.style.opacity = '0';
                setTimeout(() => {
                    elements.image.src = prop.image;
                    elements.image.style.opacity = '1';
                }, 300);
            }
            if (elements.title) elements.title.textContent = prop.title;
            if (elements.location) elements.location.textContent = prop.location;
            if (elements.price) elements.price.textContent = prop.price;
            if (elements.yield) elements.yield.textContent = prop.yield;
            if (elements.funded) elements.funded.textContent = prop.funded;
            if (elements.progress) elements.progress.style.width = prop.progress + '%';

            currentIndex = (currentIndex + 1) % properties.length;
        }

        // Change property every 4 seconds
        setInterval(updateProperty, 4000);
    })();

    // Animate pieces when the logo-assembly enters the viewport (IntersectionObserver) with fallbacks
    (function () {
        const container = document.querySelector('.logo-assembly');
        if (!container) return;

        const pieces = container.querySelectorAll('.piece');
        if (!pieces || pieces.length === 0) return;

        function runAnimation() {
            // If user prefers reduced motion, instantly show assembled state
            if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                pieces.forEach(p => p.classList.add('assemble'));
                container.classList.add('assembled');
                return;
            }

            // mark assembling to enable gold gradient shift
            container.classList.add('assembling');

            pieces.forEach((piece, index) => {
                setTimeout(() => {
                    piece.classList.add('assemble');
                    // if last piece, trigger assembled state and sweep
                    if (index === pieces.length - 1) {
                        // allow piece transition to complete before switching state
                        const finishDelay = 500; // ms
                        setTimeout(() => {
                            container.classList.remove('assembling');
                            container.classList.add('assembled');

                            // one-shot glow pulse on pieces: add glow-pulse class, let CSS animate to none
                            try {
                                const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                                if (!prefersReduced) {
                                    pieces.forEach(p => {
                                        p.classList.remove('glow-pulse'); // reset if re-used
                                        // force reflow to restart animation
                                        void p.offsetWidth;
                                        p.classList.add('glow-pulse');
                                    });
                                    // cleanup: remove the class after animation duration to keep DOM tidy
                                    setTimeout(() => pieces.forEach(p => p.classList.remove('glow-pulse')), 1500);
                                 }
                             } catch (e) {
                                 /* ignore */
                             }
                         }, finishDelay);
                    }
                }, index * 150);
            });
        }

        // If IntersectionObserver is available, observe the container and animate when visible
        if ('IntersectionObserver' in window) {
            const obs = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        runAnimation();
                        observer.disconnect();
                    }
                });
            }, { threshold: 0.35 });

            obs.observe(container);
        } else {
            // Fallback: run on load/DOMContentLoaded
            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                runAnimation();
            } else {
                document.addEventListener('DOMContentLoaded', runAnimation);
            }
            window.addEventListener('load', runAnimation);
        }
    })();
</script>
